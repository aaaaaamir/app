name: Flutter Build APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./hon

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (only arm64-v8a)
        run: flutter build apk --release --target-platform=android-arm64

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-clicker-apk
          path: hon/build/app/outputs/flutter-apk/app-release.apk
